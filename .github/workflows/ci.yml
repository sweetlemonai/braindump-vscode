name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Grammar snapshot tests
        run: npm run test:grammar

      - name: Unit tests
        run: npm run test:unit

      - name: Build bundle
        run: npm run compile -- --production

      - name: Package (dry run)
        run: npx --yes @vscode/vsce package --no-git-tag-version --no-update-package-json --out braindump.vsix
